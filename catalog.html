<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Catalog — Ilham Kasih Nur Ain</title>
<link rel="icon" href="images/icon/favicon.png" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/style.css">
</head>
<body>

  <!-- decorative stem divider, reused as signature element -->
  <template id="sprig-template">
    <svg class="sprig" viewBox="0 0 120 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M2 12 C 30 2, 90 22, 118 12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M30 8 C 34 3, 40 3, 42 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M60 16 C 64 21, 70 21, 72 16" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M90 8 C 94 3, 100 3, 102 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <circle cx="12" cy="11" r="2.2" fill="currentColor"/>
    </svg>
  </template>

  <nav class="site-nav">
    <a class="site-nav-mark" href="index.html">Ilham Kasih Nur Ain</a>
    <a class="site-nav-link" href="index.html">← Home</a>
  </nav>

  <header class="catalog-header">
    <p class="eyebrow">Full Catalog</p>
    <h1 class="catalog-title">Every Bouquet We Make</h1>
    <p class="catalog-subtitle">Search by name or mood, filter by price, or sort to find the one.</p>
  </header>

  <main>
    <section class="catalog">
      <div class="catalog-toolbar">
        <div class="toolbar-field toolbar-search">
          <label for="search-input">Search</label>
          <input type="text" id="search-input" placeholder="e.g. rose, no rose, bear">
        </div>
        <div class="toolbar-field">
          <label for="price-min">Min price (RM)</label>
          <input type="number" id="price-min" min="0" placeholder="0">
        </div>
        <div class="toolbar-field">
          <label for="price-max">Max price (RM)</label>
          <input type="number" id="price-max" min="0" placeholder="Any">
        </div>
        <div class="toolbar-field">
          <label for="sort-select">Sort</label>
          <select id="sort-select">
            <option value="featured">Featured</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
          </select>
        </div>
        <button type="button" class="toolbar-reset" id="reset-filters">Reset</button>
      </div>

      <div class="grid" id="product-grid">
        <!-- Rendered by catalog.js -->
      </div>

      <p class="catalog-empty" id="catalog-empty" hidden>No bouquets match your search — try different terms or widen your price range.</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="sprig-slot" data-sprig></div>
    <p>Ilham Kasih Nur Ain — order by message, no account needed.</p>
    <a class="footer-whatsapp" id="footer-whatsapp" href="#" target="_blank" rel="noopener">Message us on WhatsApp</a>
  </footer>

  <script src="products.js"></script>
  <script src="/scripts/common.js"></script>
  <script src="/scripts/catalog.js"></script>
</body>
</html>
